server.port=8080

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:investlabdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Create schema and load data automatically
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Enable H2 console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Show SQL queries
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=InvestLab_S3cr3t_K3y_2024_Portfolio_Javier_Mure_Dev
jwt.expiration-ms=86400000

# Actuator - expose health, info, and metrics endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=InvestLab API
info.app.description=Simulador de inversiones profesional
info.app.version=1.0.0

# SpringDoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
